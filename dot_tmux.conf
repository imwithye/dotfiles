# ============================================
# Professional tmux Configuration
# ============================================

# --- General ---

# Remap prefix to Ctrl+a (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Eliminate escape delay (critical for vim/neovim)
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start window and pane numbering from 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Enable mouse support (scroll, select pane, resize)
set -g mouse on

# Use vi mode
setw -g mode-keys vi

# Pass focus events to applications (needed by neovim)
set -g focus-events on

# --- Key Bindings ---

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Intuitive split shortcuts
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Shift + arrow keys to switch windows (no prefix)
bind -n S-Left previous-window
bind -n S-Right next-window

# Resize panes (prefix + HJKL)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vi-style copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Quick switch to last window
bind Space last-window

# Click session name in status bar to show session tree
bind -n MouseDown1StatusLeft choose-tree -w

# Synchronize panes (broadcast mode)
bind S setw synchronize-panes \; display-message "Synchronize #{?synchronize-panes,ON,OFF}"

# Right-click context menu for panes
bind -n MouseDown3Pane display-menu -T "#[bold] Pane " -x M -y M \
  "─ Split"                                "" "" \
  "  ↔ Horizontal"                         h "split-window -h -c '#{pane_current_path}'" \
  "  ↕ Vertical"                           v "split-window -v -c '#{pane_current_path}'" \
  "" \
  "─ Toggle"                               "" "" \
  "#{?synchronize-panes,  ● Sync Panes,  ○ Sync Panes}" S "setw synchronize-panes" \
  "#{?window_zoomed_flag,  ● Zoom,  ○ Zoom}"             z "resize-pane -Z" \
  "" \
  "─ Move"                                 "" "" \
  "  ↑ Swap Up"                            u "swap-pane -U" \
  "  ↓ Swap Down"                          d "swap-pane -D" \
  "  ⎋ Break to Window"                    b "break-pane" \
  "  ⎘ Join from..."                       j "choose-window 'join-pane -s %%'" \
  "  → Send to..."                         s "choose-window 'join-pane -t %%'" \
  "" \
  "─ Layout"                               "" "" \
  "  ▦ Tiled"                              t "select-layout tiled" \
  "  ⬌ Even Horizontal"                    H "select-layout even-horizontal" \
  "  ⬍ Even Vertical"                      V "select-layout even-vertical" \
  "" \
  "─ Tools"                                "" "" \
  "  # Pane Numbers"                       q "display-panes" \
  "  ⌨ Key Bindings"                       k "list-keys" \
  "  ⏲ Clock"                              T "clock-mode" \
  "" \
  "─ Clipboard"                            "" "" \
  "  ≡ Choose Buffer"                      p "choose-buffer" \
  "" \
  "  ✕ Kill Pane"                          x "confirm-before -p 'Kill pane? (y/n)' kill-pane"

# Right-click status bar / session name for unified menu
bind -n MouseDown3StatusLeft display-menu -T "#[bold] tmux " -x M -y S \
  "─ Window"                               "" "" \
  "  + New Window"                         w "new-window -c '#{pane_current_path}'" \
  "  ✎ Rename Window"                      r "command-prompt -p 'Rename:' 'rename-window %%'" \
  "  ✕ Kill Window"                        x "confirm-before -p 'Kill window? (y/n)' kill-window" \
  "" \
  "─ Session"                              "" "" \
  "  ⇄ Switch Session"                     s "choose-tree -s" \
  "  + New Session"                        n "command-prompt -p 'Session name:' 'new-session -s %%'" \
  "  ✎ Rename Session"                     R "command-prompt -p 'Rename:' 'rename-session %%'" \
  "  ⏏ Detach"                             d "detach-client"

bind -n MouseDown3Status display-menu -T "#[bold] tmux " -x M -y S \
  "─ Window"                               "" "" \
  "  + New Window"                         w "new-window -c '#{pane_current_path}'" \
  "  ✎ Rename Window"                      r "command-prompt -p 'Rename:' 'rename-window %%'" \
  "  ✕ Kill Window"                        x "confirm-before -p 'Kill window? (y/n)' kill-window" \
  "" \
  "─ Session"                              "" "" \
  "  ⇄ Switch Session"                     s "choose-tree -s" \
  "  + New Session"                        n "command-prompt -p 'Session name:' 'new-session -s %%'" \
  "  ✎ Rename Session"                     R "command-prompt -p 'Rename:' 'rename-session %%'" \
  "  ⏏ Detach"                             d "detach-client"

# --- Status Bar ---

set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 150

# --- Theme: Catppuccin Mocha ---

# Base palette
# Base=#1e1e2e  Mantle=#181825  Surface0=#313244  Surface1=#45475a
# Text=#cdd6f4  Subtext0=#a6adc8  Lavender=#b4befe  Blue=#89b4fa
# Mauve=#cba6f7  Green=#a6e3a1  Peach=#fab387  Red=#f38ba8  Teal=#94e2d5

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left "\
#{?client_prefix,\
#[fg=#fab387 bg=#1e1e2e]#[bg=#fab387 fg=#1e1e2e bold] #S #[fg=#fab387 bg=#1e1e2e],\
#[fg=#89b4fa bg=#1e1e2e]#[bg=#89b4fa fg=#1e1e2e bold] #S #[fg=#89b4fa bg=#1e1e2e]}"

set -g status-right "\
#{?pane_synchronized,#[fg=#f38ba8 bg=#1e1e2e]#[bg=#f38ba8 fg=#1e1e2e bold] SYNC #[fg=#f38ba8 bg=#1e1e2e],}\
#{?window_zoomed_flag,#[fg=#a6e3a1 bg=#1e1e2e]#[bg=#a6e3a1 fg=#1e1e2e bold] ZOOM #[fg=#a6e3a1 bg=#1e1e2e],}\
#[fg=#313244 bg=#1e1e2e]#[bg=#313244 fg=#a6adc8] #(uptime | sed 's/.*up *//' | sed 's/,.*//') \
#[fg=#45475a bg=#313244]#[bg=#45475a fg=#cdd6f4] %m/%d \
#[fg=#89b4fa bg=#45475a]#[bg=#89b4fa fg=#1e1e2e bold] %H:%M \
#[fg=#cba6f7 bg=#89b4fa]#[bg=#cba6f7 fg=#1e1e2e bold] #h "

setw -g window-status-format "\
#{?window_bell_flag,\
#[fg=#f38ba8 bg=#1e1e2e]#[bg=#f38ba8 fg=#1e1e2e bold] #I:#W #[fg=#f38ba8 bg=#1e1e2e],\
#[fg=#313244 bg=#1e1e2e]#[bg=#313244 fg=#a6adc8] #I:#W #[fg=#313244 bg=#1e1e2e]}"

setw -g window-status-current-format "\
#[fg=#cba6f7 bg=#1e1e2e]#[bg=#cba6f7 fg=#1e1e2e bold] #I:#W #[fg=#cba6f7 bg=#1e1e2e]"

set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#313244,fg=#89b4fa,bold"
set -g message-command-style "bg=#313244,fg=#cba6f7"
setw -g mode-style "bg=#45475a,fg=#cdd6f4,bold"
set -g clock-mode-colour "#89b4fa"
set -g menu-selected-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g menu-border-style "fg=#45475a"

# Shared menu/window settings
set -g menu-style "default"
set -g menu-border-lines rounded
setw -g window-status-activity-style "none"
setw -g window-status-separator ""

# --- Miscellaneous ---

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Bell notification for background window activity
set -g monitor-bell on
set -g visual-bell on
set -g bell-action other